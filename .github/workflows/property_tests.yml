name: Property-Based Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run property tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  property-tests:
    name: Run Property-Based Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        # Test with different iteration counts
        iterations: [50, 100, 200]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'

    - name: Get dependencies
      run: flutter pub get

    - name: Analyze code
      run: flutter analyze

    - name: Run unit tests first
      run: flutter test --exclude-tags=property

    - name: Run property-based tests
      run: |
        echo "Running property tests with ${{ matrix.iterations }} iterations"
        dart test/property_tests/run_property_tests.dart ${{ matrix.iterations }} --verbose
      continue-on-error: false

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: property-test-results-${{ matrix.iterations }}
        path: |
          test/property_tests/results/
          coverage/

  property-test-summary:
    name: Property Test Summary
    runs-on: ubuntu-latest
    needs: property-tests
    if: always()
    
    steps:
    - name: Download all test results
      uses: actions/download-artifact@v4
      with:
        path: test-results/

    - name: Generate summary report
      run: |
        echo "# Property-Based Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Test Results by Iteration Count" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        for dir in test-results/*/; do
          if [ -d "$dir" ]; then
            iterations=$(basename "$dir" | sed 's/property-test-results-//')
            echo "### $iterations iterations" >> $GITHUB_STEP_SUMMARY
            echo "- Status: ${{ needs.property-tests.result }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
        done
        
        echo "## Property Coverage" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Property 1: Budget surplus allocation consistency" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Property 2: Goal feasibility mathematical accuracy" >> $GITHUB_STEP_SUMMARY
        echo "- ⏳ Property 3: AI insights data-driven generation (pending)" >> $GITHUB_STEP_SUMMARY
        echo "- ⏳ Property 4: Free trial access control (pending)" >> $GITHUB_STEP_SUMMARY
        echo "- ⏳ Property 5: XP calculation consistency (pending)" >> $GITHUB_STEP_SUMMARY
        echo "- ⏳ Property 6: Onboarding data integrity (pending)" >> $GITHUB_STEP_SUMMARY
        echo "- ⏳ Property 7: Cross-feature data consistency (pending)" >> $GITHUB_STEP_SUMMARY
        echo "- ⏳ Property 8: Recommendation relevance (pending)" >> $GITHUB_STEP_SUMMARY

  nightly-extended-tests:
    name: Extended Property Tests (Nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'

    - name: Get dependencies
      run: flutter pub get

    - name: Run extended property tests
      run: |
        echo "Running extended property tests with 1000 iterations"
        dart test/property_tests/run_property_tests.dart 1000 --verbose
      timeout-minutes: 30

    - name: Generate detailed report
      if: always()
      run: |
        echo "Extended property test run completed"
        echo "This run uses 1000 iterations to catch rare edge cases"
        
    - name: Notify on failure
      if: failure()
      run: |
        echo "Extended property tests failed - this may indicate rare edge cases"
        echo "Review the test output for specific property violations"